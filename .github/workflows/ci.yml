name: CI Backend

on:
push:
branches:
- main
pull_request:
branches:
- main

permissions:
contents: read

defaults:
run:
working-directory: backend

jobs:
validate-backend:
name: Testes e build do backend
runs-on: ubuntu-latest
timeout-minutes: 15

```
services:
  postgres:
    image: postgres:16-alpine
    env:
      POSTGRES_DB: loopclub_e2e
      POSTGRES_USER: loopclub_ci
      POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
    ports:
      - 5432:5432
    options: >-
      --health-cmd="pg_isready -U loopclub_ci -d loopclub_e2e"
      --health-interval=10s
      --health-timeout=5s
      --health-retries=5

env:
  # Placeholder usado apenas por comandos que exigem DATABASE_URL.
  # Esse banco não deve ser criado nem acessado.
  DATABASE_URL: postgresql://ci_placeholder:ci_placeholder@localhost:5432/loopclub_ci_placeholder?schema=public

  # Banco PostgreSQL efêmero do service container.
  DATABASE_URL_TEST: postgresql://loopclub_ci:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/loopclub_e2e?schema=public

  # Ambiente obrigatório para o fluxo e2e protegido.
  NODE_ENV: test

  # Senha fictícia utilizada exclusivamente pelas contas do seed e2e.
  E2E_TEST_PASSWORD: ${{ secrets.CI_E2E_TEST_PASSWORD }}

  # Segredo JWT exclusivo da CI.
  JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}

  # Segredo HMAC exclusivo da CI para proteção e lookup de CPF.
  CUSTOMER_PII_HMAC_SECRET: ${{ secrets.CI_CUSTOMER_PII_HMAC_SECRET }}

steps:
  - name: Baixar o repositório
    uses: actions/checkout@v5

  - name: Configurar Node.js
    uses: actions/setup-node@v5
    with:
      node-version: 24
      cache: npm
      cache-dependency-path: backend/package-lock.json

  - name: Instalar dependências
    run: npm ci

  - name: Gerar Prisma Client
    run: npx prisma generate

  - name: Executar testes unitários
    run: npm test -- --runInBand

  - name: Compilar o backend
    run: npm run build

  - name: Validar segredo HMAC de clientes
    shell: bash
    run: |
      if [ -z "$CUSTOMER_PII_HMAC_SECRET" ]; then
        echo "CUSTOMER_PII_HMAC_SECRET ausente"
        exit 1
      fi

      if [ "${#CUSTOMER_PII_HMAC_SECRET}" -lt 32 ]; then
        echo "CUSTOMER_PII_HMAC_SECRET possui menos de 32 caracteres"
        exit 1
      fi

      echo "CUSTOMER_PII_HMAC_SECRET disponível e com tamanho válido"

  - name: Executar testes e2e
    run: npm run test:e2e:ci
```
