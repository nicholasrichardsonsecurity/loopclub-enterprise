services:
  postgres:
    image: postgres:16-alpine
    container_name: loopclub_postgres
    restart: always
    env_file: .env
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "loopclub"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - loopclub_pgdata:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: loopclub_api
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:3100:3000"
    # No expose of PostgreSQL port; API only accessible via Caddy.

volumes:
  loopclub_pgdata:
